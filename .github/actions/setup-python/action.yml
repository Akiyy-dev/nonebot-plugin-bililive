name: Setup Python
description: Setup Python

inputs:
  python-version:
    description: Python version
    required: false
    default: "3.10"

runs:
  using: composite
  steps:
    - name: Setup PDM
      uses: pdm-project/setup-pdm@v4
      with:
        python-version: ${{ inputs.python-version }}
        architecture: x64
        cache: false

    - name: Sync dependencies
      run: pdm sync -G:all
      shell: bash
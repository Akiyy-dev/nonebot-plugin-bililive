name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, e.g. v2.0.6
        required: true

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup Python environment
        uses: ./.github/actions/setup-python
        with:
          python-version: "3.11"

      - name: Install release validation tools
        run: python -m pip install twine

      - name: Get Version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag }}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          fi

          if [[ "$TAG_NAME" != v* ]]; then
            echo "Tag must start with v: $TAG_NAME"
            exit 1
          fi

          echo "VERSION=$(pdm show --version)" >> "$GITHUB_OUTPUT"
          echo "TAG_VERSION=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Check Version
        if: steps.version.outputs.VERSION != steps.version.outputs.TAG_VERSION
        run: |
          echo "Package version: ${{ steps.version.outputs.VERSION }}"
          echo "Tag version: ${{ steps.version.outputs.TAG_VERSION }}"
          exit 1

      - name: Run tests
        run: pdm run test

      - name: Smoke load plugin
        shell: bash
        run: |
          pdm run python - <<'PY'
          import asyncio
          import nonebot
          from nonebot.adapters.onebot.v11 import Adapter as OneBotV11Adapter

          async def main():
              nonebot.init(log_level="ERROR")
              driver = nonebot.get_driver()
              driver.register_adapter(OneBotV11Adapter)
              plugin = nonebot.load_plugin("nonebot_plugin_bililive")
              import nonebot_plugin_localstore as store
              from bililive.utils import get_data_dir

              assert plugin is not None
              resolved = get_data_dir()
              expected = store.get_data_dir("nonebot_plugin_bililive")
              assert resolved == expected, (resolved, expected)
              print("resolved_data_dir=", resolved)

          asyncio.run(main())
          PY

      - name: Build distributions
        run: pdm build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Publish Package
        shell: bash
        run: pdm publish --no-build

      - name: Create or update GitHub release
        shell: bash
        run: |
          gh release view "${{ steps.version.outputs.TAG_NAME }}" >/dev/null 2>&1 || gh release create "${{ steps.version.outputs.TAG_NAME }}" --generate-notes
          gh release upload --clobber "${{ steps.version.outputs.TAG_NAME }}" dist/*.tar.gz dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
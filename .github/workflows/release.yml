name: Release

on:
  push:
    tags:
      - v*

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python environment
        uses: ./.github/actions/setup-python
        with:
          python-version: "3.11"

      - name: Get Version
        id: version
        shell: bash
        run: |
          echo "VERSION=$(pdm show --version)" >> "$GITHUB_OUTPUT"
          echo "TAG_VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Check Version
        if: steps.version.outputs.VERSION != steps.version.outputs.TAG_VERSION
        run: exit 1

      - name: Run tests
        run: pdm run test

      - name: Publish Package
        shell: bash
        run: |
          pdm publish
          gh release view "${{ steps.version.outputs.TAG_NAME }}" >/dev/null 2>&1 || gh release create "${{ steps.version.outputs.TAG_NAME }}" --generate-notes
          gh release upload --clobber "${{ steps.version.outputs.TAG_NAME }}" dist/*.tar.gz dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}